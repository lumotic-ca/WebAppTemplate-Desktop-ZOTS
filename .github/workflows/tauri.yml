name: Tauri CI

on:
  push:
    branches: [main]
    paths:
      - 'tauri-template/**'
      - '.github/workflows/tauri.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tauri-template/**'
      - '.github/workflows/tauri.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: tauri-template

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-template/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm test
      - run: cargo test
        working-directory: tauri-template/src-tauri

  build-linux:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-template/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run tauri build -- --no-bundle

  build-windows:
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-template/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --no-bundle

  build-macos:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tauri-template/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --no-bundle
