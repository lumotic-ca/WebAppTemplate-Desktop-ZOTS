name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'flutter-template/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter-template/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: flutter-template

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ hashFiles('flutter-template/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ hashFiles('flutter-template/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build apk --release

  build-windows:
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ hashFiles('flutter-template/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build windows --release

  build-macos:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-${{ hashFiles('flutter-template/pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build macos --release
