<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matcha ERP Settings</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app" class="shell">
      <section class="panel">
        <h1>Settings</h1>
        <p class="lead">Manage your ERPNext connection.</p>

        <form id="settings-form">
          <label for="server-url">Server URL</label>
          <input
            id="server-url"
            name="server-url"
            type="url"
            placeholder="https://erp.company.com"
            autocomplete="url"
            required
          />
          <p class="hint">Right-click or use Ctrl+V to paste your server URL.</p>
          <p id="settings-error" class="error" role="alert" hidden></p>

          <div class="button-row">
            <button type="submit" id="save-btn">Save &amp; connect</button>
            <button type="button" id="back-btn" class="secondary">Back to ERP</button>
          </div>
        </form>

        <form id="disconnect-form" class="danger-zone">
          <h2>Disconnect</h2>
          <p class="hint">Remove the saved server URL and return to the setup screen.</p>
          <button type="submit" id="disconnect-btn" class="danger">Disconnect server</button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
